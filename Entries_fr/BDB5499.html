    <bdbheb>סְגוֺר</bdbheb>

    <ref ref="Hos 13:8" b="28" cBegin="13" vBegin="8" cEnd="13" vEnd="8" onclick="bcv(28,13,8)">Os 13,8</ref>
    <highlight>l'enveloppe de leur cœur</highlight> (<highlight>péricarde</highlight> ; c.-à-d. leurs entrailles). —
    <bdbheb>סְגוֺר</bdbheb>
    <ref ref="Job 28:15" b="18" cBegin="28" vBegin="15" cEnd="28" vEnd="15" onclick="bcv(18,28,15)">Jb 28,15</ref> doit
    = <highlight>or fin</highlight>, si vera lectio, mais voir <bdbheb>
        <reflink>סגר</reflink>
    </bdbheb>,
    <stem>Qal</stem>. <primary>vers la fin</primary> ; <bdbheb>סְגֹר</bdbheb>
    <ref ref="Ps 35:3" b="19" cBegin="35" vBegin="3" cEnd="35" vEnd="3" onclick="bcv(19,35,3)">Ps 35,3</ref> voir
