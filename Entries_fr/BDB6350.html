    <bdbheb>עֲרֻבָּה</bdbheb>
    <pos>nom féminin</pos>
    <primary>chose échangée, gage, signe</primary> ; — suffixe <bdbheb>עֲרֻבָּתָם</bdbheb>
    <ref ref="1Sam 17:18" b="9" cBegin="17" vBegin="18" cEnd="17" vEnd="18" onclick="bcv(9,17,18)">1 S 17,18</ref> =
    <highlight>un signe de leur part</highlight>, c.-à-d. réponse, signe de bien-être, <lookup onclick="bdbabb('The')">Th
    </lookup>
    <lookup onclick="bdbabb('Dr')">Dr</lookup> et autres ; absolu comme accusatif de sens apparenté avec le verbe
    <bdbheb>
        ׳</bdbheb>
    <bdbheb>עָרַב ע</bdbheb>
    <ref ref="Prov 17:18" b="20" cBegin="17" vBegin="18" cEnd="17" vEnd="18" onclick="bcv(20,17,18)">Pr 17,18</ref>
    <highlight>donner un gage</highlight>.
