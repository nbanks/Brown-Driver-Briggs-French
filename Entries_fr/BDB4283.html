<p>
    <bdbheb>מַלְאָכִי</bdbheb> <descrip>apparemment</descrip> <pos>nom propre, masculin</pos>
    <primary>Malachie</primary>, <ref ref="Mal 1:1" b="39" cBegin="1" vBegin="1" cEnd="1" vEnd="1" onclick="bcv(39,1,1)">
        Ml 1,1</ref>, mais en fait pas le nom historique de l'auteur, ni pseudonyme d'Esdras ; probablement une conjecture fondée sur
    <ref ref="Mal 3:1" b="39" cBegin="3" vBegin="1" cEnd="3" vEnd="1" onclick="bcv(39,3,1)">Ml 3,1</ref> ainsi de nombreux
    modernes ; voir <lookup onclick="bdbabb('Dr')">Dr<sup>Intr</sup></lookup>.
</p>
