<language>hébreu biblique</language>
<p>
    <bdbheb>הוֺשַׁעֲיָה</bdbheb>
    <pos>nom propre, masculin</pos> (<namemng><highlight>Yah a sauvé</highlight></namemng>) —<div class="sense">
    <sense>1.</sense> <descrip>un prince de Juda</descrip> <ref ref="Neh 12:32" b="16" cBegin="12" vBegin="32" cEnd="12" vEnd="32"
        onclick="bcv(16,12,32)">Ne 12,32</ref>, <lookup onclick="bdbabb('Sept')">
        <bdbheb>
            <reflink>ᵐ5</reflink>
        </bdbheb>
    </lookup>
    <grk>Ωσαια</grk>.
</div>
<div class="sense">
    <sense>2.</sense> <descrip>père d'Azaria ou Jezania, un chef au temps de Jérémie</descrip> <ref ref="Jer 42:1" b="24" cBegin="42"
        vBegin="1" cEnd="42" vEnd="1" onclick="bcv(24,42,1)">Jr 42,1</ref> ; <ref ref="Jer 43:2" b="24" cBegin="43"
        vBegin="2" cEnd="43" vEnd="2" onclick="bcv(24,43,2)">Jr 43,2</ref>, <lookup onclick="bdbabb('Sept')">
        <bdbheb>
            <reflink>ᵐ5</reflink>
        </bdbheb>
    </lookup>
    <grk>Μαας</grk>(<grk>ς</grk>)<grk>αιος</grk>, etc. </p>
</div>
