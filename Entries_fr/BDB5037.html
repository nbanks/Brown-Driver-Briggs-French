<p> II. <bdbheb>נוֺד</bdbheb> apparemment <pos>nom propre [d'un territoire]</pos>
    <bdbheb>׳</bdbheb>
    <bdbheb>ארץנֿ</bdbheb>
    <ref ref="Gen 4:16" b="1" cBegin="4" vBegin="16" cEnd="4" vEnd="16" onclick="bcv(1,4,16)">Gn 4,16</ref> <descrip>de la
    région dans laquelle Caïn erra</descrip> (comparer <ref ref="Gen 4:12" b="1" cBegin="4" vBegin="12"
        cEnd="4" vEnd="12" onclick="bcv(1,4,12)">Gn 4,12</ref> <ref ref="Gen 4:14" b="1" cBegin="4" vBegin="14"
        cEnd="4" vEnd="14" onclick="bcv(1,4,14)">Gn 4,14</ref>) ; <lookup onclick="bdbabb('Sept')">
        <bdbheb>
            <reflink>ᵐ5</reflink>
        </bdbheb>
    </lookup> (étrangement) <grk>Ναιδ</grk> ; <lookup onclick="bdbabb('Vg')">
        <bdbheb>
            <reflink>ᵑ9</reflink>
        </bdbheb>
    </lookup> appellatif, <highlight>profugus in terra</highlight>, comparer <lookup onclick="bdbabb('Symm')">
        <reflink>Symm</reflink>
    </lookup>
    <lookup onclick="bdbabb('Theod')">
        <reflink>Theod</reflink>
    </lookup>, voir <lookup onclick="bdbabb('Nes')">Ne<sup>Marg. 9</sup></lookup>.
</p>
