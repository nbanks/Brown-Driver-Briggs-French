<language>hébreu biblique</language>
<p>
    <bdbheb>צֵלַע</bdbheb>
    <pos>nom propre [d'un lieu]</pos>
    <descrip>en Benjamin</descrip>
    <ref ref="Josh 18:28" b="6" cBegin="18" vBegin="28" cEnd="18" vEnd="28" onclick="bcv(6,18,28)">Jos 18,28</ref>,
    <lookup onclick="bdbabb('A')">
        <reflink>A</reflink>
    </lookup>
    <lookup onclick="bdbabb('Sept')">
        <bdbheb>
            <reflink>ᵐ5</reflink>
        </bdbheb>
        <reflink><sup>L</sup></reflink>
    </lookup>
    <grk>Σελα</grk> [(<grk>ε</grk>) <grk>λαφ</grk>] ; lieu de sépulture de Saül <ref ref="2Sam 21:14" b="10" cBegin="21" vBegin="14" cEnd="21" vEnd="14" onclick="bcv(10,21,14)">2 S 21,14</ref> (<bdbheb>צֵלָֹע</bdbheb>), <grk>ἐν τῇ
        πλευρᾷ</grk> ; peut-être = Tel Amarna <transliteration>
        <highlight>Zilu</highlight>
    </transliteration>, ainsi <lookup onclick="bdbabb('Zim')">Zim<sup>ZA vi. 258</sup></lookup>
    <lookup onclick="bdbabb('Jastr')">Jastr<sup>JBL xi (1892), 105</sup></lookup> (<lookup onclick="bdbabb('Wkl')">Wkl
    </lookup>, cependant, pense à <bdbheb>סלע</bdbheb>).
</p>
