<p>
    <bdbheb>שׁוּחָה</bdbheb>
    <pos>nom féminin</pos>

    <ref ref="Jer 2:6" b="24" cBegin="2" vBegin="6" cEnd="2" vEnd="6" onclick="bcv(24,2,6)">Jr 2,6</ref>

    <bdbheb>׳</bdbheb>
    <bdbheb>כָּרָה שׁ</bdbheb>

    <ref ref="Jer 18:22" b="24" cBegin="18" vBegin="22" cEnd="18" vEnd="22" onclick="bcv(24,18,22)">Jr 18,22</ref> (
    <lookup onclick="bdbabb('Qr')">

    <ref ref="Prov 23:27" b="20" cBegin="23" vBegin="27" cEnd="23" vEnd="27" onclick="bcv(20,23,27)">Pr 23,27</ref>

        vBegin="14" cEnd="22" vEnd="14" onclick="bcv(20,22,14)">Pr 22,14</ref>.
</p>
