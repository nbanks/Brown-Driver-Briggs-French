<p>
    <bdbheb>קַשָּׁת</bdbheb>
    <pos>nom masculin</pos>
    <primary>archer</primary> (si versa l.) ; — <bdbheb>וַיְהִי</bdbheb>
    <bdbheb>׳</bdbheb>
    <bdbheb>רֹבֶה ק</bdbheb>
    <ref ref="Gen 21:20" b="1" cBegin="21" vBegin="20" cEnd="21" vEnd="20" onclick="bcv(1,21,20)">Gn 21,20</ref>
    <highlight>et il devint, en grandissant, un archer</highlight> ; mais <bdbheb>׳</bdbheb>
    <bdbheb>ר</bdbheb> alors superflu (omis par <lookup onclick="bdbabb('Sept')">
        <bdbheb>
            <reflink>ᵐ5</reflink>
        </bdbheb>
    </lookup>), après <bdbheb>וַיִּגְדָּ֑ל</bdbheb> v<sup>a</sup> ; <lookup onclick="bdbabb('Kn')">Kn</lookup>
    <lookup onclick="bdbabb('Di')">Di</lookup>
    <bdbheb>רֹבֵה קָ֑שֶׁת</bdbheb> (= <bdbheb>׳</bdbheb>
    <bdbheb>רֹמֵה ק</bdbheb>
    <ref ref="Jer 4:29" b="24" cBegin="4" vBegin="29" cEnd="4" vEnd="29" onclick="bcv(24,4,29)">Jr 4,29</ref>, que
    Ball lit ici), comparer <lookup onclick="bdbabb('Holz')">Holz</lookup>
    <lookup onclick="bdbabb('Gunk')">Gunk</lookup>.
</p>
