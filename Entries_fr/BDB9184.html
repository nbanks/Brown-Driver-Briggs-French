<language>hébreu biblique</language>
<p>
    <bdbheb>תִּמָּהוֺן</bdbheb>
    <pos>nom [masculin]</pos>
    <primary>égarement</primary> ; — absolu <bdbheb>׳</bdbheb>
    <bdbheb>ת</bdbheb>
    <ref ref="Zech 12:4" b="38" cBegin="12" vBegin="4" cEnd="12" vEnd="4" onclick="bcv(38,12,4)">Za 12,4</ref>
    construit <bdbheb>תִּמְהוֺן</bdbheb>
    <ref ref="Deut 28:28" b="5" cBegin="28" vBegin="28" cEnd="28" vEnd="28" onclick="bcv(5,28,28)">Dt 28,28</ref> —
    <gloss>égarement, stupéfaction</gloss> ; <bdbheb>לֵבָב</bdbheb>
    <bdbheb>׳</bdbheb>
    <bdbheb>ת</bdbheb> <ref ref="Deut 28:28" b="5" cBegin="28" vBegin="28" cEnd="28" vEnd="28" onclick="bcv(5,28,28)">
        Dt 28,28</ref>, de ceux qui sont égarés (voir <lookup onclick="bdbabb('Dr')">Dr</lookup>.) ; <bdbheb>׳</bdbheb>
    <bdbheb>ת</bdbheb> seul de chevaux égarés <ref ref="Zech 12:4" b="38" cBegin="12" vBegin="4" cEnd="12" vEnd="4"
        onclick="bcv(38,12,4)">Za 12,4</ref>.
</p>
