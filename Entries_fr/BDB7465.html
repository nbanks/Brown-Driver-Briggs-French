<h1>
    <entry onclick="bdbid('BDB7465')">BDB7465</entry> [<entry onclick="sn('H7053')">H7053</entry>]
</h1>
<language>hébreu biblique</language>
<p>
    <bdbheb>קִלְּשׁוֺן</bdbheb> <descrip>mot douteux, dans l'expression <bdbheb>׳</bdbheb>
    <bdbheb>וְלִשְׁלשׁ ק</bdbheb></descrip>
    <ref ref="1Sam 13:21" b="9" cBegin="13" vBegin="21" cEnd="13" vEnd="21" onclick="bcv(9,13,21)">1 S 13,21</ref>
    (serait peut-être <highlight>pointe fine</highlight>, comparer araméen <bdbarc>קלשׁ</bdbarc>
    <highlight>être mince</highlight>, d'où <bdbheb>׳</bdbheb>
    <bdbheb>ק</bdbheb>
    <bdbheb>׳</bdbheb>
    <bdbheb>שׁ</bdbheb>
    <highlight>tridens</highlight>, <lookup onclick="bdbabb('EV')">
        <reflink>E.V.</reflink>
    </lookup>
    <highlight>fourches</highlight>, mais contraire à l'analogie, voir surtout <lookup onclick="bdbabb('Dr')">Dr</lookup>).
</p>
<hr>
<p>
    <bdbheb>קָמָה</bdbheb> voir <bdbheb>
        <reflink>קום</reflink>
    </bdbheb>.
</p>
<hr>
