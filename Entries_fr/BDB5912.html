<language>hébreu biblique</language>
<p>
    <bdbheb>עִוָּרוֺן</bdbheb>
    <pos>nom [masculin]</pos>
    <primary>cécité</primary> ; — seulement dans l'expression (sujet <bdbheb>׳</bdbheb>
    <bdbheb>י</bdbheb>), <highlight>frapper</highlight> (<bdbheb>הִכָּה</bdbheb>) <highlight>de cécité</highlight> :
    figuré d'une « incapacité aveugle » (<lookup onclick="bdbabb('Dr')">Dr</lookup>) <bdbheb>׳</bdbheb>
    <bdbheb>בְּע</bdbheb>
    <ref ref="Deut 28:28" b="5" cBegin="28" vBegin="28" cEnd="28" vEnd="28" onclick="bcv(5,28,28)">Dt 28,28</ref> de
    frapper les chevaux <bdbheb>׳</bdbheb>
    <bdbheb>בַּע</bdbheb>
    <ref ref="Zech 12:4" b="38" cBegin="12" vBegin="4" cEnd="12" vEnd="4" onclick="bcv(38,12,4)">Za 12,4</ref>, c.-à-d.
    <highlight>de vertige</highlight>, les rendant follement désemparés.
</p>
